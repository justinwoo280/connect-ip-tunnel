name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: 7
          # macOS
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          # Windows
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          # FreeBSD
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set binary name
        id: name
        shell: bash
        run: |
          BIN="connect-ip-tunnel-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goarch }}" = "arm" ]; then
            BIN="${BIN}v${{ matrix.goarm }}"
          fi
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN="${BIN}.exe"
          fi
          echo "bin=${BIN}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -o "dist/${{ steps.name.outputs.bin }}" \
            ./cmd/app

      - name: Generate checksum
        run: |
          cd dist
          sha256sum "${{ steps.name.outputs.bin }}" > "${{ steps.name.outputs.bin }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.bin }}
          path: |
            dist/${{ steps.name.outputs.bin }}
            dist/${{ steps.name.outputs.bin }}.sha256
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/*
