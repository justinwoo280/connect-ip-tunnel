<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 — CertSrv</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-950 flex items-center justify-center">
<div class="w-full max-w-md px-4">
  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600 mb-4">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-white">CertSrv</h1>
    <p class="text-gray-400 text-sm mt-1">connect-ip-tunnel 证书管理</p>
  </div>

  <!-- Card -->
  <div class="bg-gray-900 rounded-2xl shadow-2xl p-8 border border-gray-800">
    {{if .}}
    <div class="mb-4 p-3 bg-red-900/40 border border-red-700 rounded-lg text-red-300 text-sm">
      用户名、密码或验证码错误，请重试。
    </div>
    {{end}}

    <form method="POST" action="/login" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1.5">用户名</label>
        <input type="text" name="username" required autofocus
          class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg text-white
                 placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1
                 focus:ring-indigo-500 transition"
          placeholder="admin">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1.5">密码</label>
        <input type="password" name="password" required
          class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg text-white
                 placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1
                 focus:ring-indigo-500 transition"
          placeholder="••••••••">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1.5">
          验证码 <span class="text-gray-500 font-normal">（Google Authenticator）</span>
        </label>
        <input type="text" name="totp" inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
          class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg text-white
                 placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1
                 focus:ring-indigo-500 transition tracking-widest text-center text-lg"
          placeholder="000000">
        <p class="mt-1 text-xs text-gray-500">首次登录无需填写</p>
      </div>
      <button type="submit"
        class="w-full py-2.5 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold
               rounded-lg transition focus:outline-none focus:ring-2 focus:ring-indigo-500
               focus:ring-offset-2 focus:ring-offset-gray-900">
        登录
      </button>
    </form>
  </div>
</div>
</body>
</html>
