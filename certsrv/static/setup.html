<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初始化设置 — CertSrv</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-950 flex items-center justify-center">
<div class="w-full max-w-md px-4">
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-amber-600 mb-4">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-white">首次登录设置</h1>
    <p class="text-gray-400 text-sm mt-1">第一步：修改默认密码</p>
  </div>

  <div class="bg-gray-900 rounded-2xl shadow-2xl p-8 border border-gray-800">
    <!-- 步骤指示器 -->
    <div class="flex items-center mb-8">
      <div class="flex items-center text-indigo-400">
        <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white text-sm font-bold">1</div>
        <span class="ml-2 text-sm font-medium">修改密码</span>
      </div>
      <div class="flex-1 h-px bg-gray-700 mx-3"></div>
      <div class="flex items-center text-gray-500">
        <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center text-gray-400 text-sm font-bold">2</div>
        <span class="ml-2 text-sm">绑定 2FA</span>
      </div>
    </div>

    {{if .}}
    <div class="mb-4 p-3 bg-red-900/40 border border-red-700 rounded-lg text-red-300 text-sm">
      {{.}}
    </div>
    {{end}}

    <form method="POST" action="/setup" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1.5">新密码</label>
        <input type="password" name="password" required minlength="8"
          class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg text-white
                 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
          placeholder="至少 8 位">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1.5">确认密码</label>
        <input type="password" name="confirm_password" required
          class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg text-white
                 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
          placeholder="再次输入密码">
      </div>
      <button type="submit"
        class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold
               rounded-lg transition focus:outline-none focus:ring-2 focus:ring-indigo-500
               focus:ring-offset-2 focus:ring-offset-gray-900">
        下一步：绑定 2FA →
      </button>
    </form>
  </div>
</div>
<script>
(function() {
  const m = document.cookie.split(';').map(c => c.trim())
    .find(c => c.startsWith('certsrv_session='));
  if (!m) return;
  const csrf = m.split('=')[1];
  document.querySelectorAll('form[method="POST"],form[method="post"]').forEach(f => {
    if (!f.querySelector('[name="_csrf"]')) {
      const i = document.createElement('input');
      i.type = 'hidden'; i.name = '_csrf'; i.value = csrf;
      f.appendChild(i);
    }
  });
})();
</script>
</body>
</html>
